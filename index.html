<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ xử lý Tài liệu Đa năng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #11091a;
            background-image: 
                radial-gradient(circle at 10% 40%, rgba(55, 25, 95, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 10%, rgba(90, 30, 130, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 50% 100%, rgba(35, 15, 60, 0.6) 0%, transparent 50%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(28, 22, 39, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .drag-active {
            border-color: #a855f7 !important;
            background-color: rgba(168, 85, 247, 0.1) !important;
        }
    </style>
</head>
<body class="min-h-screen text-white font-sans flex flex-col items-center justify-between p-8 relative overflow-hidden">
    
    <div class="flex-1 w-full flex flex-col items-center justify-center">
        <div class="mb-6 flex items-center gap-2 px-4 py-1.5 rounded-full border border-gray-600/40 bg-gray-800/30 text-[10px] font-bold text-gray-400 tracking-[0.2em]">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            PROFESSIONAL AI WORK SUITE
        </div>

        <div class="text-center mb-12">
            <h1 class="text-[42px] font-extrabold tracking-tight mb-3">Bộ xử lý Tài liệu Đa năng</h1>
            <p class="text-gray-400 text-base max-w-xl mx-auto">
                Trích xuất và chuyển đổi PDF, hình ảnh sang Word/Excel giữ nguyên cấu trúc bảng biểu.
            </p>
        </div>

        <div class="flex flex-col md:flex-row w-full max-w-5xl gap-6">
            
            <div class="flex-1 glass-panel p-6 rounded-3xl border border-gray-700/50 shadow-2xl">
                <div class="flex items-center gap-3 mb-6">
                    <span class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-sm font-bold">1</span>
                    <h2 class="font-bold text-white text-sm tracking-wide">TẢI LÊN TÀI LIỆU</h2>
                </div>
                
                <input type="file" id="fileInput" class="hidden" accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg">
                
                <div id="dropZone" class="border-2 border-dashed border-gray-600/50 rounded-2xl h-[320px] flex flex-col items-center justify-center cursor-pointer hover:bg-white/5 hover:border-gray-500 transition-all group">
                    <div id="uploadIcon" class="w-14 h-14 rounded-full bg-white/5 group-hover:bg-white/10 flex items-center justify-center mb-4 transition-colors">
                        <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    </div>
                    <p id="uploadText" class="text-gray-400 font-semibold text-xs tracking-wide text-center px-4">NHẤN HOẶC KÉO THẢ TÀI LIỆU VÀO ĐÂY<br><span class="text-[10px] font-normal opacity-70 mt-1 block">Hỗ trợ: PDF, Word, Excel, Hình ảnh</span></p>
                    
                    <div id="fileInfo" class="hidden flex flex-col items-center">
                        <svg class="w-12 h-12 text-emerald-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p id="fileName" class="text-white font-bold text-sm text-center break-all px-4"></p>
                        <p id="fileSize" class="text-gray-400 text-xs mt-1"></p>
                        <button id="removeFileBtn" class="mt-4 text-xs text-red-400 hover:text-red-300 underline">Xóa file</button>
                    </div>
                </div>
            </div>

            <div class="flex-1 glass-panel p-6 rounded-3xl border border-gray-700/50 shadow-2xl flex flex-col">
                <div class="flex items-center gap-3 mb-6">
                    <span class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-sm font-bold">2</span>
                    <h2 class="font-bold text-white text-sm tracking-wide">CHỌN ĐỊNH DẠNG</h2>
                </div>
                
                <div class="flex flex-col gap-4 flex-1" id="formatContainer">
                    </div>
                
                <button id="processBtn" class="w-full mt-6 bg-[#1f192e] py-4 rounded-2xl text-gray-400 font-bold text-sm tracking-wide hover:bg-[#2c2442] hover:text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    BẮT ĐẦU XỬ LÝ
                </button>
            </div>

        </div>
    </div>

    <div class="w-full text-center mt-12 pb-4 text-[10px] text-gray-600 font-bold tracking-widest uppercase">
        © 2026 DATACENTER VPTX · ADVANCED AI SYSTEMS
    </div>

    <script src="script.js"></script>
</body>
</html>
